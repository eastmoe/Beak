name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.0.1 or 0.0.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build Windows py${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Normalize release version
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag }}".Trim()
          if ($tag -notmatch '^[vV]?\d+\.\d+\.\d+$') {
            throw "Tag must look like v1.2.3 or 1.2.3."
          }
          $version = $tag -replace '^[vV]', ''
          "BEAK_RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append
          "BEAK_RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Stamp package version
        shell: pwsh
        run: |
          (Get-Content pyproject.toml) `
            -replace '^version = ".*"', "version = `"$env:BEAK_RELEASE_VERSION`"" |
            Set-Content pyproject.toml
          (Get-Content src/beak/__init__.py) `
            -replace '^__version__ = ".*"', "__version__ = `"$env:BEAK_RELEASE_VERSION`"" |
            Set-Content src/beak/__init__.py

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m pip install -e ".[dev]"

      - name: Test Python package
        run: |
          python -m compileall src tests
          python -m pytest -q

      - name: Publish WebView2 worker
        run: dotnet publish .\workers\Beak.WebView2Worker -c Release -r win-x64 --self-contained false

      - name: Build Python distributions
        run: python -m build

      - name: Package release payload
        shell: pwsh
        run: |
          $name = "beak-$env:BEAK_RELEASE_TAG-windows-py${{ matrix.python-version }}"
          "BEAK_RELEASE_ASSET=$name.zip" | Out-File -FilePath $env:GITHUB_ENV -Append
          New-Item -ItemType Directory -Force -Path "release\$name" | Out-Null
          Copy-Item dist\* "release\$name\"
          Copy-Item README.md, LICENSE, requirements.txt "release\$name\"
          Copy-Item -Recurse workers\Beak.WebView2Worker\bin\Release\net8.0-windows\win-x64\publish "release\$name\webview2-worker"
          Compress-Archive -Path "release\$name\*" -DestinationPath "$name.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: beak-windows-py${{ matrix.python-version }}
          path: ${{ env.BEAK_RELEASE_ASSET }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ inputs.tag }}".Trim()
          $ErrorActionPreference = "Continue"
          git ls-remote --exit-code --tags origin "refs/tags/$tag" *> $null
          $tagExists = $LASTEXITCODE -eq 0
          $ErrorActionPreference = "Stop"
          if ($tagExists) {
            Write-Host "Tag $tag already exists on origin."
          } else {
            git tag $tag $env:GITHUB_SHA
            git push origin "refs/tags/$tag"
          }

          $ErrorActionPreference = "Continue"
          gh release view $tag *> $null
          $releaseExists = $LASTEXITCODE -eq 0
          $ErrorActionPreference = "Stop"
          if ($releaseExists) {
            gh release upload $tag release-assets\*.zip --clobber
          } else {
            gh release create $tag release-assets\*.zip `
              --title $tag `
              --notes "Automated Beak release for $tag."
          }
