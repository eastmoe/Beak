name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.0.2 or 0.0.2"
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Test Python package
        run: |
          python -m compileall src tests
          python -m pytest -q

  build:
    name: Build Windows wheel
    needs: test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Normalize release version
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag }}".Trim()
          if ($tag -notmatch '^[vV]?\d+\.\d+\.\d+$') {
            throw "Tag must look like v1.2.3 or 1.2.3."
          }
          $version = $tag -replace '^[vV]', ''
          "BEAK_RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append
          "BEAK_RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Stamp package version
        shell: pwsh
        run: |
          (Get-Content pyproject.toml) `
            -replace '^version = ".*"', "version = `"$env:BEAK_RELEASE_VERSION`"" |
            Set-Content pyproject.toml
          (Get-Content src/beak/__init__.py) `
            -replace '^__version__ = ".*"', "__version__ = `"$env:BEAK_RELEASE_VERSION`"" |
            Set-Content src/beak/__init__.py

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Publish WebView2 worker
        run: dotnet publish .\workers\Beak.WebView2Worker -c Release -r win-x64 --self-contained true -p:DebugType=None -p:DebugSymbols=false

      - name: Stage WebView2 worker inside package
        shell: pwsh
        run: |
          $source = "workers\Beak.WebView2Worker\bin\Release\net8.0-windows\win-x64\publish"
          $target = "src\beak\webview2-worker"
          if (-not (Test-Path "$source\Beak.WebView2Worker.exe")) {
            throw "Published WebView2 worker executable was not found at $source."
          }
          Remove-Item -Recurse -Force $target -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $target | Out-Null
          Copy-Item -Recurse "$source\*" $target

      - name: Build Python wheel
        run: python -m build --wheel

      - name: Verify wheel payload
        shell: pwsh
        run: |
          $wheel = Get-ChildItem dist\*.whl | Select-Object -First 1
          if (-not $wheel) {
            throw "No wheel was built."
          }
          if ($wheel.Name -notmatch 'win_amd64\.whl$') {
            throw "Expected a Windows platform wheel, got $($wheel.Name)."
          }
          python -c "import sys, zipfile; wheel=sys.argv[1]; names=set(zipfile.ZipFile(wheel).namelist()); required={'beak/webview2-worker/Beak.WebView2Worker.exe','beak/webview2-worker/Beak.WebView2Worker.dll','beak/webview2-worker/Beak.WebView2Worker.deps.json','beak/webview2-worker/Beak.WebView2Worker.runtimeconfig.json','beak/webview2-worker/Microsoft.Web.WebView2.Core.dll','beak/webview2-worker/Microsoft.Web.WebView2.WinForms.dll','beak/webview2-worker/WebView2Loader.dll','beak/webview2-worker/coreclr.dll','beak/webview2-worker/hostfxr.dll','beak/webview2-worker/hostpolicy.dll','beak/webview2-worker/runtimes/win-x64/native/WebView2Loader.dll'}; missing=sorted(required-names); assert not missing, 'Missing wheel payload: '+', '.join(missing); print('Verified', wheel)" "$($wheel.FullName)"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: beak-windows-wheel
          path: dist\*.whl
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ inputs.tag }}".Trim()
          $ErrorActionPreference = "Continue"
          git ls-remote --exit-code --tags origin "refs/tags/$tag" *> $null
          $tagExists = $LASTEXITCODE -eq 0
          $ErrorActionPreference = "Stop"
          if ($tagExists) {
            Write-Host "Tag $tag already exists on origin."
          } else {
            git tag $tag $env:GITHUB_SHA
            git push origin "refs/tags/$tag"
          }

          $ErrorActionPreference = "Continue"
          gh release view $tag *> $null
          $releaseExists = $LASTEXITCODE -eq 0
          $ErrorActionPreference = "Stop"
          if ($releaseExists) {
            $zipAssets = gh release view $tag --json assets --jq '.assets[] | select(.name | endswith(".zip")) | .name'
            foreach ($asset in $zipAssets) {
              gh release delete-asset $tag $asset -y
            }
            gh release upload $tag release-assets\*.whl --clobber
          } else {
            gh release create $tag release-assets\*.whl `
              --title $tag `
              --notes "Automated Beak release for $tag."
          }
